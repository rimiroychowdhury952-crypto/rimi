<!DOCTYPE html>
<html>
<head>
    <title>Full JS Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Token Based Login</h2>

<input type="text" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>
<button onclick="login()">Login</button>

<p id="error" class="error"></p>

// -------------------- TOKEN LOGIN --------------------


<script>

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const error = document.getElementById("error");

    if(email === "admin@gmail.com" && password === "1234") {
        
        // Fake Token Generate
        const token = btoa(email + ":" + new Date().getTime());
        localStorage.setItem("token", token);

        window.location.href = "dashboard.html";
    } else {
        error.innerText = "Invalid Credentials!";
    }
}

function checkAuth() {
    const token = localStorage.getItem("token");

    if(!token) {
        alert("Unauthorized Access!");
        window.location.href = "index.html";
    } else {
        loadChart();
        loadProducts();
    }
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}

// -------------------- CHART.JS --------------------

function loadChart() {
    const ctx = document.getElementById("myChart");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Jan", "Feb", "Mar", "Apr"],
            datasets: [{
                label: "Sales",
                data: [10, 20, 15, 25],
                backgroundColor: ["red", "blue", "green", "orange"]
            }]
        }
    });
}

// -------------------- ADD TO CART --------------------

const productData = [
    { id: 1, name: "Shoes", price: 2000 },
    { id: 2, name: "Watch", price: 3000 },
    { id: 3, name: "Phone", price: 15000 }
];

let cart = [];

function loadProducts() {
    const productsDiv = document.getElementById("products");

    productData.forEach(product => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
            <strong>${product.name}</strong><br>
            ₹${product.price}<br>
            <button onclick="addToCart(${product.id})">Add to Cart</button>
        `;
        productsDiv.appendChild(div);
    });

    displayCart();
}

function addToCart(id) {
    const product = productData.find(p => p.id === id);
    cart.push(product);
    displayCart();
}

function displayCart() {
    const cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += item.price;
        cartDiv.innerHTML += `
            ${item.name} - ₹${item.price}<br>
        `;
    });

    cartDiv.innerHTML += `<hr><strong>Total: ₹${total}</strong>`;
}
</script>
</body>
</html>
