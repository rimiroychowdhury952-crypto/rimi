<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<title>For You ✨</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins', sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.bg-image{
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(20,15,15,0.5), rgba(20,15,15,0.7)),
        url('img/fog.jpg') center/cover no-repeat;
    filter: blur(2px);
    z-index:0;
}

.fog{
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
    animation:fogMove 40s linear infinite;
    z-index:1;
}
@keyframes fogMove{
    to{transform:translate(-25%,-25%);}
}

.leaf{
    position:fixed;
    top:-10px;
    font-size:18px;
    animation:fall linear forwards;
    z-index:4;
}
@keyframes fall{
    100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

.firefly{
    position:fixed;
    width:6px;
    height:6px;
    background:#ffd580;
    border-radius:50%;
    box-shadow:0 0 10px #ffd580;
    animation:fly 6s infinite ease-in-out;
    z-index:3;
}
@keyframes fly{
    50%{opacity:1; transform:translate(50px,-80px);}
}

.timer-container{
    position:relative;
    z-index:10;
    background: rgba(30,20,20,0.6);
    padding:30px 50px;
    border-radius:25px;
    backdrop-filter: blur(18px);
    box-shadow:0 0 25px rgba(255,200,150,0.25),0 20px 50px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
}

h1{
    font-size:30px;
    color:#f5e6d3;
    margin-bottom:15px;
    font-family:'Great Vibes', cursive;
}

.timer-row{
    display:flex;
    gap:10px;
    justify-content:center;
}

.time-unit{
    background:rgba(255,255,255,0.7);
    padding:12px;
    border-radius:20px;
    min-width:70px;
}

.time-number{
    font-size:26px;
    font-weight:bold;
}

.letter-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    text-align:center;
}

.envelope{
    position:relative;
    width:120px;
    height:80px;
    background:#c9a27c;
    border-radius:5px;
    cursor:pointer;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#b88c65;
    clip-path: polygon(0 0, 100% 0, 50% 50%);
    transform-origin:top;
    transition:0.6s;
}

.letter{
    position:absolute;
    width:90%;
    height:90%;
    background:white;
    top:5%;
    left:5%;
    border-radius:4px;
    transition:0.6s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateY(-60px);
}

/* MESSAGE */
.emotional-message{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    overflow-y:auto;
    color:#fff;
    font-size:24px;
    line-height:1.8;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    letter-spacing:0.6px;
    text-shadow:0 0 10px rgba(255,255,255,0.5),0 0 20px rgba(255,200,150,0.3);
    white-space:pre-line;
    padding:80px 20px;
    transition: transform 2s ease-in-out;
}

/* Floating effect for typing */
.float{
    animation: floatUpDown 6s ease-in-out infinite alternate;
}

/* Gentle floating after typing ends */
.slowFloat{
    animation: slowFloatUpDown 8s ease-in-out infinite alternate;
}

@keyframes floatUpDown{
    0%{transform: translateY(0);}
    50%{transform: translateY(-20px);}
    100%{transform: translateY(0);}
}

@keyframes slowFloatUpDown{
    0%{transform: translateY(0);}
    50%{transform: translateY(-10px);}
    100%{transform: translateY(0);}
}

/* Scrollbar */
.emotional-message::-webkit-scrollbar{
    width:6px;
}
.emotional-message::-webkit-scrollbar-thumb{
    background:#f5e6d3;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="bg-image"></div>
<div class="fog"></div>

<!-- TIMER -->
<div class="timer-container" id="timerContainer">
    <h1>Something special is waiting for you… ✨</h1>
    <div class="timer-row">
        <div class="time-unit"><div class="time-number" id="days">00</div>Days</div>
        <div class="time-unit"><div class="time-number" id="hours">00</div>Hrs</div>
        <div class="time-unit"><div class="time-number" id="minutes">00</div>Min</div>
        <div class="time-unit"><div class="time-number" id="seconds">10</div>Sec</div>
    </div>
</div>

<!-- LETTER -->
<div class="letter-box" id="letterBox">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter"></div>
    </div>
    <p style="color:white;margin-top:10px;">Tap to open</p>
</div>

<!-- MESSAGE -->
<div class="emotional-message float" id="message"></div>

<script>
function startTypingWithAutoScroll(){
let text = `Happy Birthday NEHU BABY 💖
Hamesha smile karti rehna 😁

Life mein ups and downs aate rehte hain,
un sab cheezon ke baare mein zyada soch ke koi fayda nahi hota.

Ek baat hamesha yaad rakhna —
tu perfect hai, aur hamesha rahegi.

Aur tera yeh dost hamesha tere paas rahega.
Life mein kabhi bhi koi problem aaye,
kabhi hesitate mat karna…
bas ek call karna — I am always here for you.

Sabse important baat —
kabhi khud se zyada kisi aur ko importance mat dena.
Pehle tu… phir baaki sab.

Aur ek baat aur,
agar kabhi meri koi baat tujhe hurt kare,
ya main kahin galat ho jaun,
toh bilkul hesitate mat karna…
mujhe ache se samjha dena.

Kehne ko toh bohot kuch hai…
par sab ek hi din mein nahi bolunga.
Abhi bhi bohot safar tai karna hai… ✨

Once again…
HAPPY BIRTHDAY MY BABY 🤍
I CARE ABOUT YOU SO MUCH ❤️✨`;

let el = document.getElementById("message");
el.innerHTML = "";
let i = 0;

function type(){
    if(i < text.length){
        el.innerHTML += text.charAt(i);
        i++;

        if(el.scrollHeight > el.clientHeight){
            el.scrollTop = el.scrollHeight;
        }

        setTimeout(type, 70); // slower typing
    } else {
        // After typing, change floating to slowFloat
        el.classList.remove("float");
        el.classList.add("slowFloat");
    }
}
type();
}

$(document).ready(function(){

// Leaves
setInterval(()=>{
    let leaf=$('<div class="leaf">🍂</div>');
    leaf.css({left:Math.random()*100+"%",animationDuration:(Math.random()*5+5)+"s"});
    $("body").append(leaf);
    setTimeout(()=>leaf.remove(),8000);
},800);

// Fireflies
for(let i=0;i<25;i++){
    let f=$('<div class="firefly"></div>');
    f.css({left:Math.random()*100+"%",top:Math.random()*100+"%"});
    $("body").append(f);
}

// Timer
let totalSeconds = 10;
let c = setInterval(()=>{
    let days = Math.floor(totalSeconds / (24 * 3600));
    let hours = Math.floor((totalSeconds % (24 * 3600)) / 3600);
    let minutes = Math.floor((totalSeconds % 3600) / 60);
    let seconds = totalSeconds % 60;

    $("#days").text(days < 10 ? "0"+days : days);
    $("#hours").text(hours < 10 ? "0"+hours : hours);
    $("#minutes").text(minutes < 10 ? "0"+minutes : minutes);
    $("#seconds").text(seconds < 10 ? "0"+seconds : seconds);

    if(totalSeconds <= 0){
        clearInterval(c);
        $("#timerContainer").fadeOut(800,()=>{
            $("#letterBox").fadeIn(1000);
        });
        return;
    }

    totalSeconds--;
},1000);

// Open envelope
$("#envelope").click(function(){
    $(this).addClass("open");

    setTimeout(()=>{
        $("#letterBox").fadeOut(800,()=>{
            $("#message").fadeIn(300,()=>{
                startTypingWithAutoScroll();
            });
        });
    },700);
});

});
</script>

</body>
</html>
